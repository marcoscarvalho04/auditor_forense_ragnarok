name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Go ─────────────────────────────────────────────────────────────────
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # ── 3. Diagnóstico — remova este passo após confirmar que o build funciona
      - name: Debug environment
        run: |
          echo "## Go environment" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          go env >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "---" >> "$GITHUB_STEP_SUMMARY"
          echo "go.mod contents:" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat go.mod >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          go env GOMOD
          go list -m

      # ── 4. Dependências ───────────────────────────────────────────────────────
      - name: Download modules
        run: go mod download

      # ── 5. Build cross-compilado para Windows amd64 ───────────────────────────
      - name: Build
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: "0"
        run: |
          BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          LDFLAGS="-s -w -X main.version=${{ github.ref_name }} -X main.commit=${GITHUB_SHA} -X main.buildTime=${BUILD_TIME}"
          go build -trimpath -buildvcs=false -ldflags="${LDFLAGS}" -o auditor_forense.exe .

      # ── 6. Hash SHA-256 ───────────────────────────────────────────────────────
      - name: Generate SHA-256
        id: hash
        run: |
          HASH=$(sha256sum auditor_forense.exe | awk '{print $1}')
          echo "value=${HASH}" >> "$GITHUB_OUTPUT"
          printf '%s  auditor_forense.exe\n' "${HASH}" > auditor_forense.exe.sha256.txt
          echo "### SHA-256 do binário" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat auditor_forense.exe.sha256.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      # ── 7. SLSA Provenance Attestation ────────────────────────────────────────
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: auditor_forense.exe

      # ── 8. GitHub Release ─────────────────────────────────────────────────────
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Auditor Forense ${{ github.ref_name }}"
          generate_release_notes: true
          files: |
            auditor_forense.exe
            auditor_forense.exe.sha256.txt
          body: |
            ## Informações do build

            | Campo        | Valor |
            |---|---|
            | Versão       | `${{ github.ref_name }}` |
            | Commit       | `${{ github.sha }}` |
            | Workflow run | [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |

            ## Verificação de integridade

            **SHA-256:** `${{ steps.hash.outputs.value }}`

            **Windows (PowerShell):**
            ```powershell
            (Get-FileHash .\auditor_forense.exe -Algorithm SHA256).Hash
            ```

            **Linux / macOS:**
            ```sh
            sha256sum -c auditor_forense.exe.sha256.txt
            ```

            ## Verificação de proveniência (SLSA)

            ```sh
            gh attestation verify auditor_forense.exe --repo ${{ github.repository }}
            ```
